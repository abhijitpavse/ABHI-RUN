<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ABHI Run</title>
  <style>
    body {
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    canvas {
      background: #f7f7f7;
      border: 3px solid #666;
      box-shadow: 0 3px 10px #bbb;
      touch-action: manipulation; /* ✅ IMPORTANT for mobile */
    }
  </style>
</head>
<body>

<canvas id="game" width="750" height="220"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.9;
const jumpPower = -13;
let gameSpeed = 7;
let score = 0;
let highScore = 0;
let frame = 0;
let gameOver = false;
const groundY = 200;

// Day–Night
let dayTimer = 0;
const dayLength = 2000;

// abhi
const abhi = {
  x: 60,
  y: groundY - 50,
  width: 38,
  height: 50,
  velocityY: 0,
  jumping: false
};

// Objects
let obstacles = [];
let clouds = [];
let stars = [];

// Reset
function resetGame() {
  abhi.y = groundY - abhi.height;
  abhi.velocityY = 0;
  abhi.jumping = false;
  obstacles = [];
  clouds = [];
  stars = [];
  score = 0;
  gameSpeed = 7;
  frame = 0;
  gameOver = false;
}

// ✅ UNIFIED JUMP HANDLER (Keyboard + Touch)
function handleJump() {
  if (!gameOver && !abhi.jumping) {
    abhi.velocityY = jumpPower;
    abhi.jumping = true;
  }
  if (gameOver) {
    resetGame();
    requestAnimationFrame(update);
  }
}

// Background
function drawBackground() {
  dayTimer++;
  const cycle = (dayTimer % dayLength) / dayLength;

  let sky;
  if (cycle < 0.5) {
    sky = `rgb(${200 - cycle*120}, ${230 - cycle*80}, 255)`;
  } else {
    sky = `rgb(${30 + (cycle-0.5)*60}, ${30 + (cycle-0.5)*60}, 70)`;
  }

  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (cycle < 0.45) drawSun(80, 60);
  if (cycle > 0.55) drawStars();
}

// Sun
function drawSun(x, y) {
  const g = ctx.createRadialGradient(x, y, 5, x, y, 30);
  g.addColorStop(0, "rgba(255,255,200,1)");
  g.addColorStop(1, "rgba(255,255,200,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, 30, 0, Math.PI * 2);
  ctx.fill();
}

// Stars
function drawStars() {
  if (stars.length < 40) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * 120,
      r: Math.random() * 2
    });
  }
  ctx.fillStyle = "#fff";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// abhi
function drawAbhi(ctx, x, y, frame) {
    ctx.save();
    ctx.translate(x, y);

    // Head
    ctx.fillStyle = "#f1c27d";
    ctx.beginPath();
    ctx.arc(20, 8, 7, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(20, 5, 7, Math.PI, 0);
    ctx.fill();

    // Neck
    ctx.fillStyle = "#f1c27d";
    ctx.fillRect(18, 14, 4, 4);

    // Hoodie
    ctx.fillStyle = "#2563eb";
    ctx.fillRect(12,18,16,18);

    // Hood
    ctx.beginPath();
    ctx.arc(20,20,10,Math.PI,0);
    ctx.fill();

    // Laptop Bag
    ctx.fillStyle="#444";
    ctx.fillRect(28,22,7,10);

    // Arms
    ctx.strokeStyle="#f1c27d";
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(12,23);
    ctx.lineTo(5,28);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(28,23);
    ctx.lineTo(35,28);
    ctx.stroke();

    // Legs Animation
    ctx.strokeStyle="#222";
    ctx.lineWidth=4;

    if(frame%2==0){

        ctx.beginPath();
        ctx.moveTo(16,36);
        ctx.lineTo(10,48);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(24,36);
        ctx.lineTo(30,48);
        ctx.stroke();

    }else{

        ctx.beginPath();
        ctx.moveTo(16,36);
        ctx.lineTo(20,48);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(24,36);
        ctx.lineTo(18,48);
        ctx.stroke();

    }

    // Shoes
    ctx.fillStyle="#000";
    ctx.fillRect(8,47,6,3);
    ctx.fillRect(27,47,6,3);

    ctx.restore();
}
// bug
function drawbug(ctx,x,y,h){

    ctx.save();

    ctx.translate(x,y-h);

    // Body
    ctx.fillStyle="#111";

    ctx.beginPath();
    ctx.ellipse(10,20,9,12,0,0,Math.PI*2);
    ctx.fill();

    // Wings

    ctx.fillStyle="#555";

    ctx.beginPath();
    ctx.ellipse(5,18,5,7,-0.5,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(15,18,5,7,0.5,0,Math.PI*2);
    ctx.fill();

    // Eyes

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(7,18,2,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(13,18,2,0,Math.PI*2);
    ctx.fill();

    // Legs

    ctx.strokeStyle="#111";

    for(let i=0;i<3;i++){

        ctx.beginPath();
        ctx.moveTo(2,18+i*4);
        ctx.lineTo(-5,15+i*5);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(18,18+i*4);
        ctx.lineTo(25,15+i*5);
        ctx.stroke();

    }

    ctx.restore();

}

// deadline
function drawdeadline(ctx,x,y,h){

    ctx.save();

    ctx.translate(x,y-h);

    // Calendar

    ctx.fillStyle="#fff";

    ctx.fillRect(0,0,30,40);

    ctx.strokeStyle="#222";

    ctx.strokeRect(0,0,30,40);

    // Top

    ctx.fillStyle="#d90429";

    ctx.fillRect(0,0,30,8);

    // Rings

    ctx.fillStyle="#222";

    ctx.fillRect(5,-2,3,6);

    ctx.fillRect(22,-2,3,6);

    // DEAD

    ctx.fillStyle="#000";

    ctx.font="bold 8px Arial";

    ctx.fillText("DEAD",2,20);

    ctx.fillText("LINE",4,31);

    // Warning

    ctx.fillStyle="red";

    ctx.beginPath();

    ctx.arc(15,36,2,0,Math.PI*2);

    ctx.fill();

    ctx.restore();

}

// Cloud
function drawCloud(ctx, x, y) {
  ctx.fillStyle = "#bbb";
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI * 2);
  ctx.arc(x + 20, y - 10, 20, 0, Math.PI * 2);
  ctx.arc(x + 40, y, 16, 0, Math.PI * 2);
  ctx.fill();
}

// Draw
function draw() {

  drawBackground();

ctx.font="20px monospace";
ctx.fillStyle="#222";
ctx.fillText("🏃 ABHI RUN",20,24);

ctx.font="13px monospace";
ctx.fillStyle="#666";
ctx.fillText("Escape Bugs • Deadlines • Reality",20,42);

  ctx.strokeStyle = "#555";
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();

  clouds.forEach(c => drawCloud(ctx, c.x, c.y));

  obstacles.forEach(o => {
    if(o.type=="deadline") drawdeadline(ctx, o.x, groundY, o.h);
    else drawbug(ctx, o.x, groundY, o.h);
  });

  drawAbhi(ctx, abhi.x, abhi.y, Math.floor(frame / 6));

  ctx.font = "20px monospace";
  ctx.fillStyle = "#444";
  ctx.fillText(
`BEST ${String(highScore).padStart(5,"0")}   SCORE ${String(score).padStart(5,"0")}`,
canvas.width-330,
40
);

  if (gameOver) {
    ctx.font = "36px monospace";
    ctx.fillStyle = "#d90429";
    ctx.fillText("ABHI GOT CAUGHT!", canvas.width / 2 - 165, 110);
    ctx.font = "22px monospace";
    ctx.fillStyle = "#333";
    ctx.fillText("Tap / Press Space to Make Abhi Run Again!", canvas.width / 2 - 215, 145);
  }
}

// Update
function update() {
  if (gameOver) return draw();

  frame++;
  if (frame % 120 === 0) gameSpeed += 0.25;

  abhi.y += abhi.velocityY;
  abhi.velocityY += gravity;
  if (abhi.y > groundY - abhi.height) {
    abhi.y = groundY - abhi.height;
    abhi.velocityY = 0;
    abhi.jumping = false;
  }

  if (frame % 90 === 0) {
    const isdeadline = Math.random() < 0.4;
    obstacles.push({
      x: canvas.width + 20,
      h: isdeadline ? 42 : 28,
      w: isdeadline ? 30 : 20,
      type: isdeadline ? "deadline" : "bug"
    });
  }

  obstacles.forEach(o => {
    o.x -= gameSpeed;
    if (
      o.x < abhi.x + abhi.width &&
      o.x + o.w > abhi.x &&
      groundY-o.h+5<abhi.y+abhi.height
    ) {
      gameOver = true;
      highScore = Math.max(score, highScore);
    }
  });

  obstacles = obstacles.filter(o => o.x + o.w > 0);

  if (Math.random() < 0.01) {
    clouds.push({ x: canvas.width, y: 50 + Math.random() * 40, speed: 1 + Math.random() * 2 });
  }
  clouds.forEach(c => c.x -= c.speed);
  clouds = clouds.filter(c => c.x > -80);

  if (frame % 2 === 0) score++;

  draw();
  requestAnimationFrame(update);
}

// ✅ CONTROLS
document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    handleJump();
  }
});

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  handleJump();
}, { passive: false });

canvas.addEventListener("click", () => {
  handleJump();
});

resetGame();
requestAnimationFrame(update);
</script>

</body>
</html>
